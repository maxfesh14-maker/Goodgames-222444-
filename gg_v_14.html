<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoodGames Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0b0b0b; --card: #161616; --text: #ffffff; --vip: #E040FB; --err: #ff4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        .sidebar { width: 260px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        .game-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; position: relative; }
        .vip-card { border: 2px solid var(--vip); }
        .tag { display: inline-block; background: #333; color: #aaa; padding: 4px 8px; border-radius: 6px; font-size: 10px; margin-bottom: 10px; font-weight: bold; }
        .btn { background: var(--main); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; display: block; text-align: center; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .nav-btn { padding: 12px; color: #888; cursor: pointer; border-radius: 10px; margin-bottom: 5px; text-align: center; font-weight: bold; font-size: 14px; border: none; background: transparent; }
        .nav-btn.active { background: var(--main); color: #000; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 70px; border-top: 1px solid #222; border-right: none; position: fixed; bottom: 0; left: 0; flex-direction: row; justify-content: space-around; padding: 5px; }
            .sidebar h2, .u-info { display: none; }
            .nav-btn { margin-bottom: 0; flex: 1; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="overlay" class="hidden"></div>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; padding: 20px;">
    <div style="background:var(--card); padding:30px; border-radius:25px; width:100%; max-width:340px; text-align:center; border: 1px solid #333;">
        <h2 style="color:var(--main); margin-top:0;">GoodGames</h2>
        <input type="text" id="lName" placeholder="Логин">
        <input type="password" id="lPass" placeholder="Пароль">
        <button class="btn" onclick="doLogin()">ВОЙТИ</button>
    </div>
</div>

<div class="sidebar">
    <h2 style="color:var(--main); text-align:center; margin-bottom:15px;">PORTAL</h2>
    <div id="u-info" class="u-info" style="text-align:center; margin-bottom:15px; background:#111; padding:10px; border-radius:10px;"></div>
    <div id="btn-list" class="nav-btn active" onclick="showP('list')">🎮 ИГРЫ</div>
    <div id="nav-add" class="nav-btn hidden" onclick="showP('add')">➕ СОЗДАТЬ</div>
    <div style="flex:1" class="u-info"></div>
    <div class="nav-btn" onclick="location.reload()" style="color:var(--err)">🚪 ВЫХОД</div>
</div>

<div class="content">
    <div id="p-list"><h1>Игротека</h1><div id="games"></div></div>
    <div id="p-add" class="hidden">
        <h1>➕ Новая игра</h1>
        <div class="game-card">
            <input type="text" id="gT" placeholder="Название">
            <input type="text" id="gL" placeholder="Ссылка">
            <select id="gG"><option value="Экшен">💥 Экшен</option><option value="Аркада">🕹️ Аркада</option><option value="Хоррор">👻 Хоррор</option></select>
            <label style="color:var(--vip); font-size:12px; display:block; margin:10px 0;"><input type="checkbox" id="gV"> VIP ИГРА ✨</label>
            <button class="btn" onclick="addGame()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com", projectId: "goodgames-222444" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const hwid = localStorage.getItem('gg_hwid') || 'HW-'+Math.random().toString(36).substr(2,9).toUpperCase();
    localStorage.setItem('gg_hwid', hwid);

    let user = null;

    db.ref('settings/maintenance').on('value', s => {
        const over = document.getElementById('overlay');
        if(s.val() && (!user || user.name.toLowerCase() !== 'admin')) {
            over.innerHTML = '<h1>🛠️ ОБНОВЛЕНИЕ</h1><p>Мы скоро вернемся!</p>';
            over.classList.remove('hidden');
        } else { checkBan(); }
    });

    function checkBan() {
        db.ref('bannedHWID/'+hwid).on('value', s => {
            const over = document.getElementById('overlay');
            if(s.val()) {
                over.innerHTML = '<h1 style="color:red">🚫 БАН</h1><p>Доступ с этого устройства закрыт.</p>';
                over.classList.remove('hidden');
            } else { over.classList.add('hidden'); }
        });
    }

    function doLogin() {
        const n = document.getElementById('lName').value.trim(), p = document.getElementById('lPass').value;
        db.ref('users/'+n).once('value', s => {
            const u = s.val();
            if(u && u.pass === p && !u.banned) {
                user = u; db.ref('users/'+n).update({lastHWID: hwid});
                document.getElementById('auth-screen').classList.add('hidden');
                initPortal();
            } else alert("Ошибка входа или БАН!");
        });
    }

    function initPortal() {
        db.ref('users/'+user.name).on('value', s => { 
            user = s.val(); 
            document.getElementById('u-info').innerHTML = `<b>${user.name}</b> ${user.vip?'👑':''}`;
            document.getElementById('nav-add').classList.toggle('hidden', !user.verified);
        });
        loadGames();
    }

    function showP(p) {
        document.getElementById('p-list').classList.toggle('hidden', p !== 'list');
        document.getElementById('p-add').classList.toggle('hidden', p !== 'add');
        document.getElementById('btn-list').classList.toggle('active', p === 'list');
        if(document.getElementById('nav-add')) document.getElementById('nav-add').classList.toggle('active', p === 'add');
    }

    function addGame() {
        let l = document.getElementById('gL').value; if(!l.startsWith('http')) l = 'https://'+l;
        db.ref('games').push({title:document.getElementById('gT').value, link:l, tag:document.getElementById('gG').value, author:user.name, vipGame:document.getElementById('gV').checked});
        showP('list');
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const div = document.getElementById('games'); div.innerHTML = '';
            if(s.val()) Object.values(s.val()).reverse().forEach(g => {
                const can = !g.vipGame || (user.vip || user.verified);
                div.innerHTML += `<div class="game-card ${g.vipGame?'vip-card':''}">
                    <span class="tag">${g.tag}</span><h3 style="margin:5px 0;">${g.title}</h3>
                    <p style="font-size:10px; color:#555; margin-bottom:12px;">Автор: ${g.author}</p>
                    ${can ? `<a href="${g.link}" target="_blank" class="btn">ИГРАТЬ</a>` : `<div class="btn" style="background:#222;color:#555">🔒 VIP ONLY</div>`}
                </div>`;
            });
        });
    }
</script>
</body>
</html>
