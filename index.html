<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #000; --card: #111; --text: #fff; --nav: #151515; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Экран ошибки (Maintenance) */
        #error-mode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; }

        /* Вход */
        #login-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .login-card { width: 85%; max-width: 300px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; }

        /* Система вкладок */
        #portal-ui { display: none; height: 100vh; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .page { display: none; }
        .page.active { display: block; }

        /* Нижняя панель */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; 
            background: var(--nav); border-top: 1px solid #333; 
            display: flex; justify-content: space-around; align-items: center; 
        }
        .nav-btn { color: #666; text-align: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--main); transform: scale(1.1); }
        .nav-icon { font-size: 24px; display: block; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 12px; }
        .verify-tag { color: #00d2ff; margin-left: 4px; }
    </style>
</head>
<body>

<div id="error-mode"><h1>⚠️ 404<br><small>ТЕХНИЧЕСКИЕ РАБОТЫ</small></h1></div>

<div id="login-box">
    <div class="login-card">
        <h2 style="color:var(--main)">GOOD GAMES</h2>
        <input type="text" id="log-n" placeholder="Ник">
        <input type="password" id="log-p" placeholder="Пароль">
        <button class="btn" onclick="login()">ВОЙТИ</button>
    </div>
</div>

<div id="portal-ui">
    <div class="content-area">
        <div id="p-games" class="page active">
            <h2 style="color:var(--main)">ИГРЫ</h2>
            <div id="games-list">Загрузка...</div>
        </div>

        <div id="p-add" class="page">
            <h2 style="color:var(--main)">СОЗДАТЬ</h2>
            <div id="add-content"></div>
        </div>

        <div id="p-user" class="page">
            <h2 style="color:var(--main)">ПРОФИЛЬ</h2>
            <div class="card" id="profile-info"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="tab('games', this)"><span class="nav-icon">🎮</span>Игры</div>
        <div class="nav-btn" onclick="tab('add', this)"><span class="nav-icon">➕</span>Создать</div>
        <div class="nav-btn" onclick="tab('user', this)"><span class="nav-icon">👤</span>Профиль</div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = { nick: "", verified: false };

    // Проверка глобальной ошибки
    db.ref('settings/maintenance').on('value', s => {
        document.getElementById('error-mode').style.display = s.val() ? 'flex' : 'none';
    });

    function login() {
        const n = document.getElementById('log-n').value.trim();
        const p = document.getElementById('log-p').value.trim();
        db.ref('users/' + n).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                me = { nick: n, verified: d.verified || false };
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('portal-ui').style.display = 'flex';
                renderProfile();
                renderAdd();
                loadGames();
            } else alert("Ошибка входа!");
        });
    }

    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        el.classList.add('active');
    }

    function renderAdd() {
        const c = document.getElementById('add-content');
        if(me.verified) {
            c.innerHTML = `<div class="card">
                <input type="text" id="gt" placeholder="Название игры">
                <textarea id="gd" placeholder="Описание/Ссылка" rows="4"></textarea>
                <button class="btn" onclick="send()">ОПУБЛИКОВАТЬ</button>
            </div>`;
        } else {
            c.innerHTML = `<div class="card" style="text-align:center; color:#888;">
                <p>🚫 Публикация доступна только проверенным пользователям (с галочкой).</p>
            </div>`;
        }
    }

    function renderProfile() {
        document.getElementById('profile-info').innerHTML = `
            <h3>${me.nick} ${me.verified ? '<span class="verify-tag">✔</span>' : ''}</h3>
            <p>${me.verified ? 'Проверенный автор' : 'Обычный участник'}</p>
        `;
    }

    function send() {
        const t = document.getElementById('gt').value;
        const d = document.getElementById('gd').value;
        if(t) {
            db.ref('games').push({ title: t, desc: d, author: me.nick, v: me.verified });
            alert("Готово!");
            tab('games', document.querySelector('.nav-btn'));
        }
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const l = document.getElementById('games-list'); l.innerHTML = "";
            if(s.val()) Object.values(s.val()).reverse().forEach(g => {
                l.innerHTML += `<div class="card">
                    <b>${g.title} ${g.v ? '<span class="verify-tag">✔</span>' : ''}</b><br>
                    <small>от ${g.author}</small><p>${g.desc}</p>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
