<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD GAMES PORTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        header { background: #111; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        /* Возвращаем масштаб карточек */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        
        .game-card { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.3s; 
        }
        .game-card:hover { transform: scale(1.02); border-color: var(--main); }
        .game-img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .game-info { padding: 15px; text-align: center; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-main { background: var(--main); color: #000; }
        .btn-pub { background: var(--main); color: #000; width: auto; padding: 10px 20px; display: none; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 320px; border: 1px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: bold; color: var(--main);">GOOD GAMES</div>
    <div id="user-box">
        <button class="btn-main" style="padding:8px 15px; border-radius:5px;" onclick="showM('auth-m')">ВОЙТИ</button>
    </div>
</header>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Библиотека игр</h2>
        <button id="add-btn" class="btn-pub" onclick="showM('pub-m')">+ Добавить игру</button>
    </div>
    
    <div id="game-list" class="game-grid">
        </div>
</div>

<div id="auth-m" class="modal">
    <div class="modal-content">
        <h3>Авторизация</h3>
        <input id="u-n" placeholder="Ник">
        <input id="u-p" type="password" placeholder="Пароль">
        <button class="btn btn-main" onclick="doAuth()">ВОЙТИ</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<div id="pub-m" class="modal">
    <div class="modal-content">
        <h3>Новая игра</h3>
        <input id="g-t" placeholder="Название">
        <input id="g-l" placeholder="Ссылка на игру">
        <input id="g-i" placeholder="Ссылка на картинку">
        <button class="btn btn-main" onclick="doPub()">ОПУБЛИКОВАТЬ</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;

    // 1. Загрузка игр
    db.ref('games').on('value', s => {
        const list = document.getElementById('game-list');
        list.innerHTML = "";
        const data = s.val();
        if(data) {
            Object.values(data).reverse().forEach(g => {
                list.innerHTML += `
                    <div class="game-card">
                        <img src="${g.img || 'https://via.placeholder.com/300x180'}" class="game-img">
                        <div class="game-info">
                            <b>${g.title}</b><br>
                            <small>Автор: ${g.author}</small>
                            <a href="${g.link}" target="_blank" class="btn btn-main" style="display:block; text-decoration:none;">ИГРАТЬ</a>
                        </div>
                    </div>`;
            });
        } else {
            list.innerHTML = "<p>Игр пока нет. Будь первым!</p>";
        }
    });

    // 2. Вход
    function doAuth() {
        const n = document.getElementById('u-n').value, p = document.getElementById('u-p').value;
        db.ref('users/' + n).once('value', s => {
            if(s.exists() && s.val().pass == p) {
                currentUser = { nick: n, ...s.val() };
                document.getElementById('user-box').innerHTML = `Привет, <b>${n}</b>`;
                if(currentUser.vip || currentUser.verified) {
                    document.getElementById('add-btn').style.display = 'block';
                }
                closeM();
            } else alert("Ошибка входа!");
        });
    }

    // 3. Публикация
    function doPub() {
        const t = document.getElementById('g-t').value, l = document.getElementById('g-l').value, i = document.getElementById('g-i').value;
        if(!t || !l) return alert("Заполни данные!");
        db.ref('games').push({ title: t, link: l, img: i, author: currentUser.nick });
        closeM();
    }

    function showM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
