<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы | GoodGames</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .maintenance-card {
            background: linear-gradient(145deg, #1a1a1a, #111111);
            padding: 60px 40px;
            border-radius: 35px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.15);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: breathe 4s infinite ease-in-out;
        }

        .icon {
            font-size: 65px;
            margin-bottom: 25px;
            display: inline-block;
            animation: spin 5s linear infinite;
        }

        .logo {
            font-size: 3.5em;
            font-weight: 900;
            color: #00ff88;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin: 15px 0 30px 0;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-transform: uppercase;
        }

        h1 {
            font-size: 1.6em;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .description {
            font-size: 1.1em;
            line-height: 1.6;
            color: #bbbbbb;
            margin-bottom: 20px;
        }

        .highlight {
            color: #00ff88;
            font-weight: 600;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 255, 136, 0.1); }
            50% { transform: scale(1.02); box-shadow: 0 0 60px rgba(0, 255, 136, 0.25); }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon">⚙️</div>
        <p class="logo">GoodGames</p>
        <div class="badge">Обновление системы</div>
        
        <h1>Режим входа временно недоступен</h1>
        
        <p class="description">
            Приносим искренние извинения за <span class="highlight">предоставленные неудобства</span>. 
            Мы проводим технические работы, чтобы сделать портал лучше и безопаснее.
        </p>

        <p class="description">
            Пожалуйста, подождите немного. Скоро мы снова будем в строю!
        </p>
    </div>

</body>
</html>
