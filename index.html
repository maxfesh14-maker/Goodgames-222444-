<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #000; --card: #111; --text: #fff; --nav: #151515; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Экран ошибки */
        #error-mode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; }

        /* Вход */
        #login-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }

        /* Вкладки */
        .page { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
        .active-page { display: block; }

        /* Нижняя панель навигации */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; 
            background: var(--nav); border-top: 1px solid #333; 
            display: flex; justify-content: space-around; align-items: center; z-index: 4000; 
        }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--main); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        .verified-badge { color: #00d2ff; margin-left: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div id="error-mode"><h1>⚠️ 404<br><small>ТЕХНИЧЕСКИЕ РАБОТЫ</small></h1></div>

<div id="login-box">
    <div style="width: 85%; max-width: 300px;">
        <h2 style="color:var(--main); text-align:center;">GOOD GAMES</h2>
        <input type="text" id="n-i" placeholder="Ник">
        <input type="password" id="p-i" placeholder="Пароль">
        <button class="btn" onclick="login()">ВХОД</button>
    </div>
</div>

<div id="portal-ui" style="display:none">
    <div id="page-home" class="page active-page">
        <h2 style="color:var(--main)">Лента игр</h2>
        <div id="games-feed"></div>
    </div>

    <div id="page-pub" class="page">
        <h2 style="color:var(--main)">Публикация</h2>
        <div id="pub-container">
            </div>
    </div>

    <div id="page-profile" class="page">
        <h2 style="color:var(--main)">Мой профиль</h2>
        <div class="card">
            <h3 id="u-display"></h3>
            <p id="u-status-text"></p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Главная</div>
        <div class="nav-item" onclick="showPage('pub', this)">➕<br>Создать</div>
        <div class="nav-item" onclick="showPage('profile', this)">👤<br>Профиль</div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = { nick: "", verified: false };

    db.ref('settings/maintenance').on('value', s => {
        document.getElementById('error-mode').style.display = s.val() ? 'flex' : 'none';
    });

    function login() {
        const n = document.getElementById('n-i').value.trim();
        const p = document.getElementById('p-i').value.trim();
        db.ref('users/' + n).once('value', s => {
            const data = s.val();
            if(data && data.pass === p) {
                user.nick = n;
                user.verified = data.verified || false;
                
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('portal-ui').style.display = 'block';
                document.getElementById('u-display').innerHTML = n + (user.verified ? '<span class="verified-badge">✔</span>' : '');
                document.getElementById('u-status-text').innerText = user.verified ? "Статус: Проверенный автор" : "Статус: Обычный игрок";
                
                setupPubTab();
                loadGames();
            } else { alert("Ошибка!"); }
        });
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active-page');
        el.classList.add('active');
    }

    function setupPubTab() {
        const cont = document.getElementById('pub-container');
        if(user.verified) {
            cont.innerHTML = `
                <div class="card">
                    <input type="text" id="gt" placeholder="Название игры">
                    <textarea id="gd" placeholder="Описание и ссылка"></textarea>
                    <button class="btn" onclick="publish()">ОПУБЛИКОВАТЬ</button>
                </div>`;
        } else {
            cont.innerHTML = `<div class="card" style="text-align:center;">
                <p>🚫 Публикация доступна только проверенным пользователям с галочкой.</p>
                <small>Обратитесь к админу для получения статуса.</small>
            </div>`;
        }
    }

    function publish() {
        const t = document.getElementById('gt').value;
        const d = document.getElementById('gd').value;
        if(t) {
            db.ref('games').push({ title: t, desc: d, author: user.nick, verified: user.verified });
            alert("Игра отправлена!");
            showPage('home', document.querySelector('.nav-item'));
        }
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const f = document.getElementById('games-feed'); f.innerHTML = "";
            if(s.val()) Object.values(s.val()).reverse().forEach(g => {
                f.innerHTML += `<div class="card">
                    <b>${g.title} ${g.verified ? '<span class="verified-badge">✔</span>' : ''}</b><br>
                    <small>Автор: ${g.author}</small><p>${g.desc}</p>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
