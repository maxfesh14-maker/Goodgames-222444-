<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoodGames Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #00f2fe; --bg: #0b0b0b; --card: #161616; --text: #ffffff; --vip: #E040FB; --err: #ff4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 340px; text-align: center; border: 1px solid #333; }
        
        /* Боковая панель */
        .sidebar { width: 260px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-align: center; display: block; transition: 0.2s; text-decoration: none; }
        .btn:active { transform: scale(0.95); }
        
        .nav-btn { padding: 12px; color: #888; cursor: pointer; border-radius: 10px; margin-bottom: 5px; text-align: center; font-weight: bold; border: none; background: transparent; width: 100%; }
        .nav-btn.active { background: var(--main); color: #000; }
        
        .game-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; }
        .vip-card { border: 2px solid var(--vip); }
        .tag { display: inline-block; background: #333; color: #aaa; padding: 4px 8px; border-radius: 6px; font-size: 10px; margin-bottom: 10px; font-weight: bold; }
        
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 70px; border-top: 1px solid #222; position: fixed; bottom: 0; left: 0; flex-direction: row; justify-content: space-around; padding: 5px; }
            .sidebar h2, .u-info { display: none; }
            .nav-btn { margin-bottom: 0; flex: 1; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--main); margin-top:0;">GoodGames</h2>
        <input type="text" id="lName" placeholder="Логин">
        <input type="password" id="lPass" placeholder="Пароль">
        <button class="btn" onclick="doLogin()">ВОЙТИ</button>
    </div>
</div>

<div class="sidebar">
    <h2 style="color:var(--main); text-align:center;">PORTAL</h2>
    <div id="u-info" style="text-align:center; margin-bottom:15px; background:#111; padding:10px; border-radius:10px;"></div>
    <button id="btn-list" class="nav-btn active" onclick="showP('list')">🎮 ИГРЫ</button>
    <button id="nav-add" class="nav-btn hidden" onclick="showP('add')">➕ СОЗДАТЬ</button>
    <div style="flex:1"></div>
    <button class="nav-btn" onclick="location.reload()" style="color:var(--err)">🚪 ВЫХОД</button>
</div>

<div class="content">
    <div id="p-list"><h1>Игротека</h1><div id="games"></div></div>
    <div id="p-add" class="hidden">
        <h1>➕ Новая игра</h1>
        <div class="game-card">
            <input type="text" id="gT" placeholder="Название">
            <input type="text" id="gL" placeholder="Ссылка">
            <button class="btn" onclick="addGame()">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>
</div>

<script>
    // Твои настройки Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com", 
        projectId: "goodgames-222444" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let user = null;

    function doLogin() {
        const typedName = document.getElementById('lName').value.trim();
        const typedPass = document.getElementById('lPass').value.trim();
        
        if(!typedName || !typedPass) return alert("Заполни все поля!");

        // Идем в users/логин
        db.ref('users/' + typedName).once('value', s => {
            const data = s.val();
            
            // Если такой папки нет в базе
            if(!data) {
                return alert("Пользователь не найден!");
            }
            
            // ПРОВЕРКА ПАРОЛЯ (защищенная)
            try {
                const dbPass = data.pass ? data.pass.toString() : "";
                
                if(dbPass === typedPass) {
                    user = data;
                    user.id = typedName; 
                    document.getElementById('auth-screen').classList.add('hidden');
                    initPortal();
                } else {
                    alert("Неверный пароль!");
                }
            } catch (e) {
                alert("Ошибка при чтении пароля. Проверь базу данных!");
            }
        }).catch(err => alert("Ошибка подключения к базе!"));
    }

    function initPortal() {
        const info = document.getElementById('u-info');
        info.innerHTML = `<b>${user.id}</b> ${user.vip?'👑':''}`;
        
        // Показываем кнопку "Создать", если пользователь Admin или верифицирован
        if(user.verified || user.id.toLowerCase() === 'admin') {
            document.getElementById('nav-add').classList.remove('hidden');
        }
        loadGames();
    }

    function showP(p) {
        document.getElementById('p-list').classList.toggle('hidden', p !== 'list');
        document.getElementById('p-add').classList.toggle('hidden', p !== 'add');
        document.getElementById('btn-list').classList.toggle('active', p === 'list');
        const addBtn = document.getElementById('nav-add');
        if(addBtn) addBtn.classList.toggle('active', p === 'add');
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const div = document.getElementById('games');
            div.innerHTML = '';
            const allGames = s.val();
            if(allGames) {
                Object.values(allGames).reverse().forEach(g => {
                    // Проверка доступа
                    const isAdmin = user.id.toLowerCase() === 'admin';
                    const canPlay = !g.vipGame || user.vip || user.verified || isAdmin;
                    
                    div.innerHTML += `
                        <div class="game-card ${g.vipGame?'vip-card':''}">
                            <h3 style="margin:5px 0;">${g.title}</h3>
                            <p style="font-size:10px; color:#555;">Автор: ${g.author || 'Неизвестен'}</p>
                            ${canPlay ? `<a href="${g.link}" target="_blank" class="btn">ИГРАТЬ</a>` : `<div class="btn" style="background:#222;color:#555">🔒 VIP ONLY</div>`}
                        </div>`;
                });
            }
        });
    }

    function addGame() {
        const t = document.getElementById('gT').value;
        let l = document.getElementById('gL').value;
        if(!t || !l) return alert("Заполни данные!");
        if(!l.startsWith('http')) l = 'https://' + l;

        db.ref('games').push({
            title: t,
            link: l,
            author: user.id
        });
        alert("Игра добавлена!");
        showP('list');
    }
</script>
</body>
</html>
