<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodGames Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #181818; padding: 25px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); width: 300px; text-align: center; border: 1px solid #2a2a2a; }
        h2 { color: #00f2fe; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00f2fe; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #00f2fe, #4facfe); color: black; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { transform: scale(1.03); filter: brightness(1.1); }
        .toggle { margin-top: 15px; font-size: 0.85em; color: #888; cursor: pointer; text-decoration: underline; }
        .toggle:hover { color: #00f2fe; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">GoodGames</h2>
    <input type="text" id="user" placeholder="Логин">
    <input type="password" id="pass" placeholder="Пароль">
    <button id="btn" onclick="mainAction()">Войти</button>
    <div class="toggle" id="toggleLink" onclick="switchMode()">Нет аккаунта? Регистрация</div>
</div>

<script>
    // ТВОИ КЛЮЧИ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAs-LhYl2vXF7S_Ym9S8V4j0Z1W2E3R4T5",
        authDomain: "goodgames-222444.firebaseapp.com",
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com",
        projectId: "goodgames-222444",
        storageBucket: "goodgames-222444.appspot.com",
        messagingSenderId: "555123456789",
        appId: "1:555123456789:web:abcdef123456789"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLoginMode = true;

    function switchMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "GoodGames" : "Регистрация";
        document.getElementById('btn').innerText = isLoginMode ? "Войти" : "Создать профиль";
        document.getElementById('toggleLink').innerText = isLoginMode ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
    }

    function mainAction() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();

        if (!u || !p) return alert("Заполни все поля!");

        const ref = db.ref('users/' + u);

        if (isLoginMode) {
            // ЛОГИКА ВХОДА
            ref.once('value', (s) => {
                if (s.exists() && s.val().password === p) {
                    alert("Успешный вход! Добро пожаловать.");
                } else {
                    alert("Ошибка: Неверный логин или пароль!");
                }
            });
        } else {
            // ЛОГИКА РЕГИСТРАЦИИ
            ref.once('value', (s) => {
                if (s.exists()) {
                    alert("Этот логин уже занят!");
                } else {
                    ref.set({
                        password: p,
                        role: "user",
                        date: new Date().toLocaleDateString()
                    }).then(() => {
                        alert("Аккаунт создан! Теперь можешь войти.");
                        switchMode();
                    });
                }
            });
        }
    }
</script>

</body>
</html>
