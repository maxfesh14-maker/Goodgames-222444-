<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        #login-box { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 280px; 
        }
        input { padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; width: 90%; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        #portal-ui { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--main)">ВХОД</h2>
        <input type="text" id="nick-input" placeholder="Никнейм">
        <input type="password" id="pass-input" placeholder="Пароль">
        <button class="btn" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="portal-ui">
        <h1 style="color:var(--main)">ПОРТАЛ ИГР</h1>
        <p>Вы вошли как: <b id="display-name"></b></p>
        <hr>
        <div id="games-container"></div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
            databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const nick = document.getElementById('nick-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            if(!nick || !pass) return alert("Заполни все поля!");

            // Проверяем пароль в базе
            db.ref('users/' + nick).once('value', s => {
                const user = s.val();
                if(user && user.pass === pass) {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('portal-ui').style.display = 'block';
                    document.getElementById('display-name').innerText = nick;
                    
                    // Ставим статус online
                    db.ref('users/' + nick).update({ status: 'online' });
                    db.ref('users/' + nick + '/status').onDisconnect().set('offline');
                } else {
                    alert("Неверный ник или пароль!");
                }
            });
        }
    </script>
</body>
</html>
