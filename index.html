<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG ADMIN TITAN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #050505; --card: #121212; --text: #eee; --red: #ff4444; --green: #4CAF50; --blue: #2196F3; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 { color: var(--main); text-align: center; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { color: #888; font-size: 18px; border-left: 4px solid var(--main); padding-left: 10px; margin-top: 30px; }

        .container { max-width: 900px; margin: 0 auto; }

        /* ПОИСК */
        #user-search { 
            width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; 
            color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 20px; outline: none;
            transition: 0.3s;
        }
        #user-search:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(251, 192, 45, 0.2); }

        /* КАРТОЧКИ */
        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; 
            margin-bottom: 15px; animation: slideIn 0.4s ease forwards; position: relative;
            transition: 0.3s;
        }
        .card:hover { border-color: #444; background: #161616; }

        /* КНОПКИ */
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .btn { 
            padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 12px; transition: 0.2s; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-vip { background: var(--main); color: #000; }
        .btn-ver { background: var(--blue); color: #fff; }
        .btn-ban { background: var(--red); color: #fff; }
        .btn-unban { background: #444; color: #fff; }
        .btn-del { background: #222; color: #888; border: 1px solid #333; }
        .btn-pub { background: var(--green); color: #fff; width: 100%; font-size: 16px; margin-top: 10px; }

        /* ИНФО */
        .info { font-size: 13px; color: #999; margin: 5px 0; }
        .info b { color: #fff; }
        .dev-id { font-family: monospace; color: var(--main); background: #222; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-left: 5px; }
        .badge-ban { background: var(--red); color: #fff; }
        .badge-vip { background: var(--main); color: #000; }

        input[type="text"], select { 
            background: #111; border: 1px solid #333; color: #fff; padding: 12px; 
            border-radius: 8px; width: 100%; margin: 5px 0; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Titan Admin V4</h1>

    <div class="section">
        <h2>🚀 БЫСТРАЯ ПУБЛИКАЦИЯ</h2>
        <div class="card">
            <input type="text" id="g_t" placeholder="Название игры">
            <input type="text" id="g_u" placeholder="URL-ссылка (https://...)">
            <select id="g_v">
                <option value="normal">ОБЫЧНАЯ ИГРА</option>
                <option value="vip">VIP ЭКСКЛЮЗИВ</option>
            </select>
            <button class="btn btn-pub" onclick="publish()">ОПУБЛИКОВАТЬ НА ПОРТАЛ</button>
        </div>
    </div>

    <div class="section">
        <h2>👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</h2>
        <input type="text" id="user-search" placeholder="Поиск по нику или ID..." oninput="render()">
        <div id="u_list">Загрузка базы данных...</div>
    </div>
</div>

<script>
    // Твой конфиг Firebase
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usersData = {};

    // Загрузка данных
    db.ref('users').on('value', s => {
        usersData = s.val() || {};
        render();
    });

    function render() {
        const list = document.getElementById('u_list');
        const q = document.getElementById('user-search').value.toLowerCase();
        list.innerHTML = "";

        Object.entries(usersData).forEach(([nick, u]) => {
            if(nick.toLowerCase().includes(q) || (u.deviceID && u.deviceID.toLowerCase().includes(q))) {
                const isBanned = u.ban || u.deviceID_ban;
                const fCount = u.friends ? Object.keys(u.friends).length : 0;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:20px; font-weight:bold">${nick} 
                            ${u.vip ? '<span class="badge badge-vip">VIP</span>' : ''}
                            ${isBanned ? '<span class="badge badge-ban">BANNED</span>' : ''}
                        </span>
                        <span class="info">Друзей: <b>${fCount}</b></span>
                    </div>
                    
                    <div class="info">Ключ: <b style="color:var(--green)">${u.pass}</b></div>
                    <div class="info">DeviceID: <span class="dev-id">${u.deviceID || 'N/A'}</span></div>
                    
                    <div class="btn-group">
                        <button class="btn btn-vip" onclick="upd('${nick}', 'vip', ${!u.vip})">${u.vip?'Снять VIP':'Дать VIP'}</button>
                        <button class="btn btn-ver" onclick="upd('${nick}', 'verified', ${!u.verified})">Verify</button>
                        
                        ${isBanned ? 
                            `<button class="btn btn-unban" onclick="unban('${nick}')">🔓 UNBAN DEVICE</button>` : 
                            `<button class="btn btn-ban" onclick="ban('${nick}', '${u.deviceID}')">🚫 BAN DEVICE</button>`
                        }
                        
                        <button class="btn btn-del" onclick="del('users/${nick}')">Удалить</button>
                    </div>
                `;
                list.appendChild(card);
            }
        });
    }

    // Функции управления
    function upd(n, f, v) { db.ref('users/' + n).update({ [f]: v }); }

    function ban(n, id) {
        if(confirm("Забанить устройство " + n + "?")) {
            db.ref('users/' + n).update({ ban: true, deviceID_ban: id || "unknown" });
        }
    }

    function unban(n) {
        if(confirm("Разбанить " + n + "?")) {
            db.ref('users/' + n).update({ ban: false, deviceID_ban: null });
        }
    }

    function del(path) {
        if(confirm("Удалить навсегда?")) db.ref(path).remove();
    }

    function publish() {
        const t = document.getElementById('g_t').value;
        const u = document.getElementById('g_u').value;
        const v = document.getElementById('g_v').value;
        if(t && u) {
            db.ref('games').push({ title: t, url: u, type: v, author: "ADMIN" })
            .then(() => { alert("Игра добавлена!"); document.getElementById('g_t').value=""; document.getElementById('g_u').value=""; });
        }
    }
</script>
</body>
</html>
