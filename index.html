<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы | GoodGames</title>
    <style>
        /* Основные стили страницы */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Глубокий черный */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Карточка сообщения */
        .container {
            background: #1a1a1a;
            padding: 50px 40px;
            border-radius: 25px;
            border: 2px solid #00ff88; /* Твой фирменный зеленый */
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
            text-align: center;
            max-width: 550px;
            width: 90%;
        }

        /* Логотип */
        .logo {
            font-size: 3.2em;
            font-weight: 800;
            color: #00ff88;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        /* Значок статуса */
        .status-label {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        /* Текст извинения */
        .message {
            font-size: 1.1em;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 35px;
        }

        .highlight {
            color: #00ff88;
            font-weight: 600;
        }

        /* Ссылка на главный портал */
        .portal-link {
            display: inline-block;
            color: #00ff88;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .portal-link:hover {
            border-bottom: 1px solid #00ff88;
            opacity: 0.8;
        }

        /* Анимация иконки */
        .gears {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
            animation: rotate 4s linear infinite;
        }
