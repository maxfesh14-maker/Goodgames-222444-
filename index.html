<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        /* Стиль уведомления МЭШ */
        #mesh-toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #1e1e1e; color: white; padding: 15px 25px; border-radius: 50px;
            border: 1px solid #333; transition: 0.5s; z-index: 9999;
        }
        #mesh-toast.active { bottom: 30px; }
    </style>
</head>
<body>

    <div id="mesh-toast">📩 <span id="toast-text"></span></div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
            databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ВАЖНО: Тут должен быть ник того, кто зашел (например, через вход)
        const myName = "Maksim_Dev"; 

        // Слушаем личные сообщения из облака
        db.ref('users/' + myName + '/remoteMsg').on('value', (s) => {
            const msg = s.val();
            if(msg) {
                const toast = document.getElementById('mesh-toast');
                document.getElementById('toast-text').innerText = msg;
                toast.classList.add('active');
                
                // Прячем через 5 секунд и удаляем из базы, чтобы не всплывало при перезагрузке
                setTimeout(() => {
                    toast.classList.remove('active');
                    db.ref('users/' + myName + '/remoteMsg').set("");
                }, 5000);
            }
        });
    </script>
</body>
</html>
