<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Вход */
        #login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        input { padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; width: 200px; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }

        /* Уведомление МЭШ */
        #mesh-toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #1e1e1e; color: white; padding: 15px 30px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: 0.6s; z-index: 10000; border: 1px solid #333;
        }
        #mesh-toast.active { bottom: 40px; }
        
        #portal-ui { display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--main)">Вход в Good Games</h2>
        <input type="text" id="nick-input" placeholder="Ваш ник..."> <br>
        <button class="btn" onclick="login()">Войти</button>
    </div>

    <div id="portal-ui">
        <h1 style="color:var(--main)">GOOD GAMES</h1>
        <p>Привет, <span id="display-name" style="font-weight:bold"></span>!</p>
        <p>Ты в системе. Жди сообщений от админа.</p>
    </div>

    <div id="mesh-toast">📩 <span id="msg-text"></span></div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
            databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const nick = document.getElementById('nick-input').value;
            if(!nick) return alert("Введите ник!");

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('portal-ui').style.display = 'block';
            document.getElementById('display-name').innerText = nick;

            startSystem(nick);
        }

        function startSystem(userNick) {
            const stRef = db.ref('users/' + userNick);
            
            // Статус Online
            db.ref('.info/connected').on('value', s => {
                if(s.val()) {
                    stRef.update({ status: 'online', name: userNick });
                    stRef.child('status').onDisconnect().set('offline');
                }
            });

            // Слушаем личные сообщения МЭШ
            stRef.child('remoteMsg').on('value', s => {
                const msg = s.val();
                if(msg) {
                    const toast = document.getElementById('mesh-toast');
                    document.getElementById('msg-text').innerText = msg;
                    toast.classList.add('active');
                    setTimeout(() => { 
                        toast.classList.remove('active');
                        stRef.update({ remoteMsg: "" }); 
                    }, 5000);
                }
            });
        }
    </script>
</body>
</html>
