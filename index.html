<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Games Portal | v13.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #000; --card: #111; --text: #fff; --nav: #151515; --online: #4CAF50; --vip: #FFD700; --ban: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #screen-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; padding: 20px; }
        #auth-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { width: 85%; max-width: 320px; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        #portal-ui { display: none; height: 100vh; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; } .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--nav); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: #666; text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--main); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; position: relative; }
        .tag { color: var(--main); font-size: 12px; margin-right: 5px; opacity: 0.8; }
        .vip-badge { background: var(--vip); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

<div id="screen-msg"></div>

<div id="auth-box">
    <div class="auth-card" id="login-form">
        <h2 style="color:var(--main)">GOOD GAMES</h2>
        <input type="text" id="l-n" placeholder="Ник">
        <input type="password" id="l-p" placeholder="Пароль">
        <button class="btn" onclick="login()">ВОЙТИ</button>
        <button class="btn" style="background:#333; color:#fff" onclick="showAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-card" id="reg-form" style="display:none">
        <h2 style="color:var(--main)">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="r-n" placeholder="Ник">
        <input type="password" id="r-p" placeholder="Пароль">
        <button class="btn" onclick="register()">СОЗДАТЬ</button>
        <button class="btn" style="background:#333; color:#fff" onclick="showAuth('login')">НАЗАД</button>
    </div>
</div>

<div id="portal-ui">
    <div class="content-area">
        <div id="p-games" class="page active"><h2 style="color:var(--main)">🎮 ИГРЫ</h2><div id="games-list"></div></div>
        <div id="p-add" class="page"><h2 style="color:var(--main)">➕ СОЗДАТЬ</h2><div id="add-content"></div></div>
        <div id="p-user" class="page"><h2 style="color:var(--main)">👤 ПРОФИЛЬ</h2><div class="card" id="profile-info"></div></div>
    </div>
    <div class="nav-bar">
        <div class="nav-btn active" onclick="tab('games', this)">🎮<br>Игры</div>
        <div class="nav-btn" onclick="tab('add', this)">➕<br>Создать</div>
        <div class="nav-btn" onclick="tab('user', this)">👤<br>Профиль</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let me = { nick: "", vip: false, verified: false };

    if(localStorage.getItem('gg_hwid_ban')) showMsg("🚫 ДОСТУП ОГРАНИЧЕН (HWID BAN)", "var(--ban)");

    function showMsg(t, c) { const s = document.getElementById('screen-msg'); s.style.display = 'flex'; s.innerHTML = `<h1 style="color:${c}">${t}</h1>`; }
    db.ref('settings/maintenance').on('value', s => { if(s.val()) showMsg("⚠️ ТЕХНИЧЕСКИЕ РАБОТЫ", "var(--main)"); else if(!localStorage.getItem('gg_hwid_ban')) document.getElementById('screen-msg').style.display = 'none'; });

    function showAuth(m) { document.getElementById('login-form').style.display = m=='login'?'block':'none'; document.getElementById('reg-form').style.display = m=='reg'?'block':'none'; }

    function register() {
        const n = document.getElementById('r-n').value.trim(); const p = document.getElementById('r-p').value.trim();
        if(n.length < 3) return alert("Ник слишком короткий!");
        db.ref('users/' + n).set({ pass: p, verified: false, vip: false, ban: false, status: 'offline' }).then(() => { alert("Аккаунт создан!"); showAuth('login'); });
    }

    function login() {
        const n = document.getElementById('l-n').value.trim(); const p = document.getElementById('l-p').value.trim();
        db.ref('users/' + n).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                if(d.ban) return alert("Вы забанены!");
                if(d.hwid_ban) { localStorage.setItem('gg_hwid_ban','true'); location.reload(); return; }
                me = { nick: n, verified: d.verified, vip: d.vip };
                document.getElementById('auth-box').style.display = 'none'; document.getElementById('portal-ui').style.display = 'flex';
                db.ref('users/'+n).update({ status: 'online' }); renderAdd(); loadGames(); renderProfile();
            } else alert("Неверный ник или пароль!");
        });
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const l = document.getElementById('games-list'); l.innerHTML = "";
            if(s.val()) Object.entries(s.val()).reverse().forEach(([id, g]) => {
                if(g.type === 'vip' && !me.vip) {
                    l.innerHTML += `<div class="card" style="opacity:0.6; filter:grayscale(1)"><b>🔒 ${g.title}</b><br><small>Только для VIP-игроков</small></div>`;
                } else {
                    let tags = g.tags ? g.tags.split(' ').map(t => `<span class="tag">#${t}</span>`).join('') : '';
                    l.innerHTML += `<div class="card">${g.type==='vip'?'<span class="vip-badge">VIP</span>':''}
                    <b>${g.title} ${g.v?'✔':''}</b><br><small>Автор: ${g.author}</small><br>${tags}
                    <button class="btn" style="background:#4CAF50;color:white" onclick="window.open('${g.url}')">ИГРАТЬ</button></div>`;
                }
            });
        });
    }

    function renderAdd() {
        const c = document.getElementById('add-content');
        if(me.verified || me.vip) {
            c.innerHTML = `<div class="card">
                <input id="gt" placeholder="Название игры">
                <input id="gl" placeholder="Ссылка на игру">
                <input id="gh" placeholder="Теги (через пробел)">
                <select id="gtype">
                    <option value="normal">Для всех</option>
                    ${me.vip ? '<option value="vip">Для VIP</option>' : ''}
                </select>
                <button class="btn" onclick="send()">ОПУБЛИКОВАТЬ</button>
            </div>`;
        } else c.innerHTML = `<p style="text-align:center">Публикация доступна авторам с ✔ или VIP.</p>`;
    }

    function send() {
        const t = document.getElementById('gt').value; const l = document.getElementById('gl').value;
        const h = document.getElementById('gh').value; const ty = document.getElementById('gtype').value;
        if(t && l) { db.ref('games').push({title:t, url:l, tags:h, type:ty, author:me.nick, v:me.verified}); tab('games', document.querySelectorAll('.nav-btn')[0]); }
    }

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active'); el.classList.add('active');
    }
    function renderProfile() { document.getElementById('profile-info').innerHTML = `<h3>${me.nick} ${me.vip?'👑':''}</h3><p>${me.vip?'Статус: VIP Игрок':'Статус: Игрок'}</p>`; }
</script>
</body>
</html>
