<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD GAMES PORTAL - REPAIR</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0b0b0b; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #111; padding: 20px; border-bottom: 2px solid var(--main); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; width: 300px; border: 1px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--main); color: #000; }
        .btn-main:active { transform: scale(0.95); background: #fff; }
        #status-msg { color: #ff4444; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2 id="logo">GOOD GAMES</h2>
</header>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Аккаунт</h2>
        <input type="text" id="u-n" placeholder="Никнейм (например, Admin)">
        <input type="password" id="u-p" placeholder="Пароль">
        
        <button class="btn btn-main" onclick="startLogin()">ВОЙТИ</button>
        <button class="btn" style="background:#222; color:#888;" onclick="startReg()">РЕГИСТРАЦИЯ</button>
        
        <div id="status-msg">Нажми "Войти" или "Регистрация"</div>
    </div>
</div>

<script>
    // 1. Проверь, чтобы эта ссылка была ТАКАЯ ЖЕ, как в админке!
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    
    // Инициализация
    try {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        console.log("Firebase готов!");
    } catch(e) {
        document.getElementById('status-msg').innerText = "Ошибка запуска: " + e.message;
    }

    function startLogin() {
        const n = document.getElementById('u-n').value.trim();
        const p = document.getElementById('u-p').value.trim();
        const msg = document.getElementById('status-msg');

        if(!n || !p) { msg.innerText = "Ошибка: Введи ник и пароль!"; return; }
        
        msg.style.color = "#FBC02D";
        msg.innerText = "Связь с базой...";

        db.ref('users/' + n).once('value').then(s => {
            const data = s.val();
            if(data) {
                if(data.pass == p) {
                    msg.style.color = "#4CAF50";
                    msg.innerText = "Успех! Входим...";
                    // Сохраняем вход
                    localStorage.setItem('currentUser', n);
                    setTimeout(() => { document.getElementById('auth-modal').style.display = 'none'; }, 1000);
                } else {
                    msg.style.color = "#ff4444";
                    msg.innerText = "Ошибка: Неверный пароль!";
                }
            } else {
                msg.style.color = "#ff4444";
                msg.innerText = "Ошибка: Пользователь не найден!";
            }
        }).catch(err => {
            msg.innerText = "Ошибка сети: " + err.message;
        });
    }

    function startReg() {
        const n = document.getElementById('u-n').value.trim();
        const p = document.getElementById('u-p').value.trim();
        const msg = document.getElementById('status-msg');

        if(!n || !p) { msg.innerText = "Заполни поля для регистрации!"; return; }

        db.ref('users/' + n).set({
            pass: p,
            vip: false,
            verified: false
        }).then(() => {
            msg.style.color = "#4CAF50";
            msg.innerText = "Зарегистрирован! Теперь жми ВОЙТИ.";
        }).catch(err => {
            msg.innerText = "Ошибка регистрации: " + err.message;
        });
    }
</script>
</body>
</html>
