<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodGames | Технические работы</title>
    <style>
        /* Основные цвета: Чёрный (#000000) и Жёлтый (#ffcc00) */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            background: #111111;
            padding: 50px 30px;
            border-radius: 20px;
            border: 4px solid #ffcc00; /* Жёлтая рамка */
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        /* Декоративные полоски сверху и снизу в стиле ленты ограждения */
        .tape {
            height: 15px;
            background: repeating-linear-gradient(
                -45deg,
                #ffcc00,
                #ffcc00 10px,
                #000000 10px,
                #000000 20px
            );
            width: 100%;
            position: absolute;
            left: 0;
        }

        .tape-top { top: 0; border-top-left-radius: 15px; border-top-right-radius: 15px; }
        .tape-bottom { bottom: 0; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }

        .logo {
            font-size: 3.2em;
            font-weight: 900;
            color: #ffcc00; /* Жёлтый логотип */
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .icon-gear {
            font-size: 60px;
            margin-top: 10px;
            display: inline-block;
            animation: rotate-gear 6s linear infinite;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        .message-text {
            font-size: 1.1em;
            line-height: 1.6;
            color: #eeeeee;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
            text-decoration: underline;
        }

        @keyframes rotate-gear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Пульсация всей карточки */
        .pulse {
            animation: pulse-border 3s infinite ease-in-out;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.1); }
            50% { border-color: #ffe066; box-shadow: 0 0 50px rgba(255, 204, 0, 0.4); }
        }
    </style>
</head>
<body>

    <div class="main-container pulse">
        <div class="tape tape-top"></div>
        
        <div class="icon-gear">⚙️</div>
        <p class="logo">GoodGames</p>
        
        <h1>Обновление системы</h1>
        
        <p class="message-text">
            Приносим искренние извинения за <span class="highlight">предоставленные неудобства</span>. 
            В данный момент мы перенастраиваем режим входа для стабильной работы портала.
        </p>

        <p class="message-text">
            Совсем скоро всё будет готово. Спасибо за ваше терпение!
        </p>

        <div class="tape tape-bottom"></div>
    </div>

</body>
</html>
