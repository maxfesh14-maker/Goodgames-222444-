<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD GAMES PORTAL - OFFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0a0a0a; --card: #161616; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Техработы */
        #m-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        header { background: #111; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        
        /* Сетка игр (вернул масштаб) */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--main); }
        .game-img { width: 100%; height: 170px; object-fit: cover; background: #222; }
        .game-info { padding: 20px; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.2s; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; }
        .btn-main { background: var(--main); color: #000; width: 100%; }
        .btn-main:hover { background: #fff; }
        .btn-rev { background: transparent; border: 1px solid #333; color: #888; width: 100%; margin-top: 10px; }
        .btn-rev:hover { border-color: var(--main); color: var(--main); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; width: 350px; border: 1px solid #333; }
        
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .rev-item { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--main); font-size: 14px; text-align: left; }
        .badge { background: var(--main); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="m-screen"><h1>🚧</h1><h2>ТЕХНИЧЕСКИЕ РАБОТЫ</h2><p id="m-reason"></p></div>

<header>
    <div style="font-size: 26px; font-weight: 900; color: var(--main); letter-spacing: 1px;">GOOD GAMES</div>
    <div id="auth-zone">
        <button class="btn btn-main" style="width: auto;" onclick="openM('auth-modal')">ВОЙТИ / РЕГИСТРАЦИЯ</button>
    </div>
</header>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
        <h2 style="margin:0; font-size: 24px;">Библиотека игр</h2>
        <button id="pub-btn" class="btn btn-main" style="display:none; width:auto;" onclick="openM('pub-modal')">+ Опубликовать</button>
    </div>
    <div id="game-list" class="game-grid">
        </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--main)">Аккаунт</h2>
        <input id="u-n" placeholder="Ник">
        <input id="u-p" type="password" placeholder="Пароль">
        <button class="btn btn-main" onclick="auth('login')">ВОЙТИ</button>
        <button class="btn btn-rev" style="border-color:var(--main); color:var(--main)" onclick="auth('reg')">СОЗДАТЬ АККАУНТ</button>
        <button class="btn btn-rev" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<div id="rev-modal" class="modal">
    <div class="modal-content">
        <h3 id="rev-title" style="color:var(--main); margin-top:0;">Отзывы</h3>
        <div id="rev-container" style="max-height: 250px; overflow-y: auto; margin-bottom:15px; padding-right: 5px;"></div>
        <div id="rev-input-zone" style="display:none;">
            <textarea id="rev-text" placeholder="Напиши мнение об игре..." rows="3"></textarea>
            <button class="btn btn-main" onclick="sendReview()">ОТПРАВИТЬ</button>
        </div>
        <button class="btn btn-rev" onclick="closeM()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="pub-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--main)">Новая игра</h2>
        <input id="g-t" placeholder="Название игры">
        <input id="g-l" placeholder="Ссылка на игру (URL)">
        <input id="g-i" placeholder="Ссылка на иконку (URL)">
        <button class="btn btn-main" onclick="publish()">ОПУБЛИКОВАТЬ</button>
        <button class="btn btn-rev" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, currentG = null;

    // Техработы
    db.ref('maintenance').on('value', s => {
        const m = s.val() || {};
        document.getElementById('m-screen').style.display = m.status ? 'flex' : 'none';
        document.getElementById('m-reason').innerText = m.reason || "";
    });

    // Логика Входа/Регистрации
    function auth(type) {
        const n = document.getElementById('u-n').value.trim();
        const p = document.getElementById('u-p').value.trim();
        if(!n || !p) return alert("Заполни все поля!");

        db.ref('users/' + n).once('value', s => {
            const data = s.val();
            if(type === 'login') {
                if(data && data.pass == p) {
                    if(data.ban) return alert("БАН!");
                    user = { nick: n, ...data };
                    loginSuccess();
                } else alert("Неверный ник или пароль!");
            } else {
                if(s.exists()) alert("Ник занят!");
                else {
                    db.ref('users/' + n).set({ pass: p, vip: false, verified: false })
                    .then(() => alert("Регистрация успешна! Теперь нажми ВОЙТИ."));
                }
            }
        });
    }

    function loginSuccess() {
        document.getElementById('auth-zone').innerHTML = `<b>${user.nick}</b> ${user.verified ? '<span class="badge">V</span>' : ''} <button onclick="location.reload()" style="background:none; border:none; color:#555; cursor:pointer; margin-left:10px;">Выйти</button>`;
        if(user.verified || user.vip) document.getElementById('pub-btn').style.display = 'block';
        closeM();
    }

    // Игры
    function publish() {
        const t = document.getElementById('g-t').value, l = document.getElementById('g-l').value, i = document.getElementById('g-i').value;
        if(!t || !l) return alert("Название и ссылка обязательны!");
        db.ref('games').push({ title: t, link: l, img: i || 'https://via.placeholder.com/300x150?text=GOOD+GAMES', author: user.nick });
        closeM();
    }

    db.ref('games').on('value', s => {
        const list = document.getElementById('game-list'); list.innerHTML = "";
        const data = s.val();
        if(data) Object.entries(data).reverse().forEach(([id, g]) => {
            list.innerHTML += `
                <div class="game-card">
                    <img src="${g.img}" class="game-img" onerror="this.src='https://via.placeholder.com/300x150?text=GAME'">
                    <div class="game-info">
                        <b style="font-size:18px;">${g.title}</b><br>
                        <small style="color:#666">Разработчик: ${g.author}</small>
                        <a href="${g.link}" target="_blank" class="btn btn-main" style="margin-top:20px;">ИГРАТЬ</a>
                        <button class="btn btn-rev" onclick="openReviews('${id}', '${g.title}')">ОТЗЫВЫ</button>
                    </div>
                </div>`;
        });
    });

    // Отзывы
    function openReviews(id, title) {
        currentG = id;
        document.getElementById('rev-title').innerText = title;
        document.getElementById('rev-input-zone').style.display = user ? 'block' : 'none';
        db.ref('reviews').orderByChild('gameID').equalTo(id).on('value', s => {
            const cont = document.getElementById('rev-container'); cont.innerHTML = "";
            if(s.val()) Object.values(s.val()).reverse().forEach(r => {
                cont.innerHTML += `<div class="rev-item"><b>${r.author}:</b> ${r.text}</div>`;
            }); else cont.innerHTML = "<p style='color:#444'>Отзывов пока нет.</p>";
        });
        openM('rev-modal');
    }

    function sendReview() {
        const txt = document.getElementById('rev-text').value.trim();
        if(!txt) return;
        db.ref('reviews').push({ gameID: currentG, author: user.nick, text: txt });
        document.getElementById('rev-text').value = "";
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
