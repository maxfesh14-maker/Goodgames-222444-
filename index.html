<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Games Portal | AP 3.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #000; --card: #111; --text: #fff; --nav: #151515; --online: #4CAF50; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        #error-mode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; }
        
        /* Авторизация */
        #auth-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { width: 85%; max-width: 320px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        .link-btn { color: var(--main); background: none; border: none; cursor: pointer; margin-top: 10px; font-size: 14px; text-decoration: underline; }

        /* Интерфейс */
        #portal-ui { display: none; height: 100vh; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; } .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--nav); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: #666; text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--main); }

        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #555; }
        .online { background: var(--online); box-shadow: 0 0 5px var(--online); }
        .verify-tag { color: #00d2ff; margin-left: 5px; }
    </style>
</head>
<body>

<div id="error-mode"><h1>⚠️ 404<br><small>ТЕХНИЧЕСКИЕ РАБОТЫ</small></h1></div>

<div id="auth-box">
    <div class="auth-card" id="login-form">
        <h2 style="color:var(--main)">GOOD GAMES</h2>
        <input type="text" id="l-n" placeholder="Ник">
        <input type="password" id="l-p" placeholder="Пароль">
        <button class="btn" onclick="login()">ВОЙТИ</button>
        <button class="link-btn" onclick="showAuth('reg')">Создать новый аккаунт</button>
    </div>
    <div class="auth-card" id="reg-form" style="display:none">
        <h2 style="color:var(--main)">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="r-n" placeholder="Придумайте ник">
        <input type="password" id="r-p" placeholder="Придумайте пароль">
        <button class="btn" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        <button class="link-btn" onclick="showAuth('login')">Уже есть аккаунт? Войти</button>
    </div>
</div>

<div id="portal-ui">
    <div class="content-area">
        <div id="p-games" class="page active"><h2 style="color:var(--main)">🎮 ИГРЫ</h2><div id="games-list"></div></div>
        <div id="p-add" class="page"><h2 style="color:var(--main)">➕ СОЗДАТЬ</h2><div id="add-content"></div></div>
        <div id="p-user" class="page">
            <h2 style="color:var(--main)">👤 ПРОФИЛЬ</h2><div class="card" id="profile-info"></div>
            <h3 style="color:var(--main)">👥 ДРУЗЬЯ</h3>
            <div class="card"><input type="text" id="f-search" placeholder="Ник друга..."><button class="btn" onclick="addF()">ДОБАВИТЬ</button></div>
            <div id="friend-requests"></div><div id="friend-list"></div>
        </div>
    </div>
    <div class="nav-bar">
        <div class="nav-btn active" onclick="tab('games', this)">🎮<br>Игры</div>
        <div class="nav-btn" onclick="tab('add', this)">➕<br>Создать</div>
        <div class="nav-btn" onclick="tab('user', this)">👤<br>Профиль</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let me = { nick: "", verified: false };

    db.ref('settings/maintenance').on('value', s => { document.getElementById('error-mode').style.display = s.val() ? 'flex' : 'none'; });

    function showAuth(m) { 
        document.getElementById('login-form').style.display = m=='login'?'block':'none'; 
        document.getElementById('reg-form').style.display = m=='reg'?'block':'none'; 
    }

    function register() {
        const n = document.getElementById('r-n').value.trim(); const p = document.getElementById('r-p').value.trim();
        if(n.length < 3) return alert("Ник должен быть длиннее 3 символов!");
        db.ref('users/' + n).once('value', s => {
            if(s.val()) alert("Этот ник уже занят!");
            else db.ref('users/' + n).set({ pass: p, verified: false, status: 'offline' }).then(() => { alert("Успешно! Теперь войдите."); showAuth('login'); });
        });
    }

    function login() {
        const n = document.getElementById('l-n').value.trim(); const p = document.getElementById('l-p').value.trim();
        db.ref('users/' + n).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                me = { nick: n, verified: d.verified || false };
                document.getElementById('auth-box').style.display = 'none'; document.getElementById('portal-ui').style.display = 'flex';
                db.ref('users/' + n).update({ status: 'online' }); db.ref('users/' + n + '/status').onDisconnect().set('offline');
                loadGames(); loadFriends(); renderProfile(); renderAdd();
            } else alert("Ошибка! Проверьте ник или пароль.");
        });
    }

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active'); el.classList.add('active');
    }

    function addF() { const t = document.getElementById('f-search').value.trim(); if(t && t !== me.nick) { db.ref('friendRequests/' + t + '/' + me.nick).set(true); alert("Заявка отправлена!"); } }
    
    function loadFriends() {
        db.ref('friendRequests/' + me.nick).on('value', s => {
            const d = document.getElementById('friend-requests'); d.innerHTML = "";
            if(s.val()) Object.keys(s.val()).forEach(from => { d.innerHTML += `<div class="card">Заявка от <b>${from}</b> <button class="btn" style="width:80px" onclick="acceptF('${from}')">ОК</button></div>`; });
        });
        db.ref('friends/' + me.nick).on('value', s => {
            const d = document.getElementById('friend-list'); d.innerHTML = "";
            if(s.val()) Object.keys(s.val()).forEach(f => {
                db.ref('users/' + f + '/status').on('value', st => { d.innerHTML += `<div class="card"><span class="status-dot ${st.val()==='online'?'online':''}"></span><b>${f}</b></div>`; });
            });
        });
    }

    function acceptF(n) { db.ref('friends/'+me.nick+'/'+n).set(true); db.ref('friends/'+n+'/'+me.nick).set(true); db.ref('friendRequests/'+me.nick+'/'+n).remove(); }

    function loadGames() {
        db.ref('games').on('value', s => {
            const l = document.getElementById('games-list'); l.innerHTML = "";
            if(s.val()) Object.entries(s.val()).reverse().forEach(([id, g]) => {
                let rH = ''; if(g.reviews) Object.values(g.reviews).forEach(r => { rH += `<div style="font-size:12px;color:#888"><b>${r.user}:</b> ${r.text}</div>`; });
                l.innerHTML += `<div class="card"><b>${g.title} ${g.v?'<span class="verify-tag">✔</span>':''}</b><br><small>от ${g.author}</small>
                <button class="btn" style="background:#4CAF50;color:white" onclick="window.open('${g.url}','_blank')">ИГРАТЬ</button>
                <div style="margin-top:10px;border-top:1px solid #333">${rH}<input id="ri-${id}" placeholder="Отзыв..." style="font-size:12px;padding:5px;"><button class="btn" style="padding:5px;font-size:12px" onclick="addR('${id}')">ОТПРАВИТЬ</button></div></div>`;
            });
        });
    }

    function addR(id) { const t = document.getElementById('ri-'+id).value; if(t) db.ref('games/'+id+'/reviews').push({user:me.nick,text:t}); }

    function renderAdd() {
        const c = document.getElementById('add-content');
        if(me.verified) c.innerHTML = `<div class="card"><input id="gt" placeholder="Название"><input id="gl" placeholder="Ссылка"><textarea id="gd" placeholder="Описание"></textarea><button class="btn" onclick="send()">ОПУБЛИКОВАТЬ</button></div>`;
        else c.innerHTML = `<p>Только авторы с галочкой могут публиковать игры.</p>`;
    }

    function send() { 
        const t = document.getElementById('gt').value; const l = document.getElementById('gl').value;
        if(t && l) { db.ref('games').push({title:t,url:l,desc:document.getElementById('gd').value,author:me.nick,v:me.verified}); tab('games', document.querySelector('.nav-btn')); }
    }

    function renderProfile() { document.getElementById('profile-info').innerHTML = `<h3>${me.nick} ${me.verified?'<span class="verify-tag">✔</span>':''}</h3><p>${me.verified?'Проверенный автор':'Игрок'}</p>`; }
</script>
</body>
</html>
