<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodGames Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0b0b0b; --card: #161616; --text: #ffffff; --err: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        #maintenance-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .btn { background: var(--main); color: #000; padding: 10px; border-radius: 10px; text-decoration: none; display: block; font-weight: bold; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="maintenance-screen" class="hidden">
    <div>
        <h1 style="font-size: 60px;">⚠️</h1>
        <h2>Техническая неисправность</h2>
        <p>Пожалуйста, попробуйте позже, мы скоро вернёмся!</p>
    </div>
</div>

<h1 style="text-align: center; color: var(--main);">🎮 GOODGAMES PORTAL</h1>
<div class="content" id="games-list"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com", 
        projectId: "goodgames-222444" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Слушаем режим ошибки
    db.ref('settings/maintenance').on('value', s => {
        if (s.val() === true) {
            document.getElementById('maintenance-screen').classList.remove('hidden');
        } else {
            document.getElementById('maintenance-screen').classList.add('hidden');
        }
    });

    // Загрузка игр
    db.ref('games').on('value', s => {
        const div = document.getElementById('games-list');
        div.innerHTML = '';
        if(s.val()) Object.values(s.val()).reverse().forEach(g => {
            div.innerHTML += `<div class="game-card"><h3>${g.title}</h3><a href="${g.link}" target="_blank" class="btn">ИГРАТЬ</a></div>`;
        });
    });
</script>
</body>
</html>
