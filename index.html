<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD GAMES - FIXED</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--main); color: #000; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; width: 320px; border: 1px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .game-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--main);">GOOD GAMES</div>
    <div id="user-nav"><button class="btn" onclick="openM()">Войти / Регистрация</button></div>
</header>

<div class="container">
    <div id="game-list"></div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin:0">Аккаунт</h2>
        <input id="u-n" placeholder="Ник (Максим)">
        <input id="u-p" type="password" placeholder="Пароль">
        <button class="btn" style="width:100%" onclick="doLogin()">ВОЙТИ</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#222; color:#fff" onclick="doReg()">РЕГИСТРАЦИЯ</button>
        <button class="btn" style="width:100%; margin-top:10px; background:none; color:#555" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", 
        databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function doLogin() {
        const n = document.getElementById('u-n').value.trim();
        const p = document.getElementById('u-p').value.trim();
        if(!n || !p) return alert("Введите данные!");

        // Самая простая и надежная проверка
        db.ref('users/' + n).once('value').then(s => {
            const data = s.val();
            console.log("Вход для:", n, "Данные в базе:", data);

            if(data && data.pass == p) {
                if(data.ban) return alert("Аккаунт заблокирован!");
                alert("Успешный вход!");
                document.getElementById('user-nav').innerHTML = `<b>${n}</b>`;
                closeM();
            } else {
                alert("Неверный ник или пароль!");
            }
        }).catch(e => alert("Ошибка базы: " + e.message));
    }

    function doReg() {
        const n = document.getElementById('u-n').value.trim();
        const p = document.getElementById('u-p').value.trim();
        if(!n || !p) return alert("Заполни всё!");

        db.ref('users/' + n).set({
            pass: p,
            vip: false,
            verified: false
        }).then(() => alert("Регистрация прошла! Теперь жми войти."));
    }

    function openM() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeM() { document.getElementById('auth-modal').style.display = 'none'; }
</script>
</body>
</html>
