<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOD GAMES PORTAL V2.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #0b0b0b; --card: #151515; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        #m-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        header { background: #111; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .game-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .game-img { width: 100%; height: 150px; background: #333; object-fit: cover; }
        .game-info { padding: 15px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-decoration: none; display: inline-block; text-align: center; }
        .btn-main { background: var(--main); color: #000; width: 100%; box-sizing: border-box; }
        .btn-rev { background: #222; color: #888; width: 100%; margin-top: 5px; box-sizing: border-box; font-size: 12px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 380px; border: 1px solid var(--main); max-height: 80vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .rev-item { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--main); }
    </style>
</head>
<body>

<div id="m-screen"><h1>🚧</h1><h2>Техработы</h2><p id="m-reason"></p></div>

<header>
    <div style="font-size: 24px; font-weight: bold; color: var(--main);">GOOD GAMES</div>
    <div id="auth-zone"><button class="btn btn-main" onclick="openM('auth-modal')">ВОЙТИ</button></div>
</header>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Витрина игр</h2>
        <button id="pub-btn" class="btn btn-main" style="display:none; width:auto;" onclick="openM('pub-modal')">ОПУБЛИКОВАТЬ</button>
    </div>
    <div id="game-list" class="game-grid"></div>
</div>

<div id="rev-modal" class="modal">
    <div class="modal-content">
        <h3 id="rev-title" style="color:var(--main)">Отзывы</h3>
        <div id="rev-container" style="margin-bottom:15px;"></div>
        <div id="rev-input-zone" style="display:none;">
            <textarea id="rev-text" placeholder="Напиши свой отзыв..."></textarea>
            <button class="btn btn-main" onclick="sendReview()">ОТПРАВИТЬ</button>
        </div>
        <button class="btn btn-rev" onclick="closeM()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <h2>Вход</h2>
        <input id="u-nick" placeholder="Ник"><input type="password" id="u-pass" placeholder="Пароль">
        <button class="btn btn-main" onclick="login()">ВОЙТИ</button>
        <button class="btn btn-rev" onclick="register()">РЕГИСТРАЦИЯ</button>
        <button class="btn btn-rev" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<div id="pub-modal" class="modal">
    <div class="modal-content">
        <h2>Новая игра</h2>
        <input id="g-t" placeholder="Название"><input id="g-l" placeholder="Ссылка (URL)"><input id="g-i" placeholder="Ссылка на иконку">
        <button class="btn btn-main" onclick="publish()">ОПУБЛИКОВАТЬ</button>
        <button class="btn btn-rev" onclick="closeM()">ОТМЕНА</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, currentG = null;

    db.ref('maintenance').on('value', s => {
        const m = s.val() || {};
        document.getElementById('m-screen').style.display = m.status ? 'flex' : 'none';
        document.getElementById('m-reason').innerText = m.reason || "";
    });

    function login() {
        const n = document.getElementById('u-nick').value, p = document.getElementById('u-pass').value;
        db.ref('users/'+n).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                if(d.ban) return alert("БАН!");
                user = { nick: n, ...d };
                document.getElementById('auth-zone').innerHTML = `<b>${n}</b>`;
                if(user.verified || user.vip) document.getElementById('pub-btn').style.display = 'block';
                closeM();
            } else alert("Ошибка!");
        });
    }

    function register() {
        const n = document.getElementById('u-nick').value, p = document.getElementById('u-pass').value;
        db.ref('users/'+n).set({ pass: p, vip: false, verified: false }).then(() => alert("Создано!"));
    }

    function publish() {
        const t = document.getElementById('g-t').value, l = document.getElementById('g-l').value, i = document.getElementById('g-i').value;
        db.ref('games').push({ title: t, link: l, img: i, author: user.nick });
        closeM();
    }

    db.ref('games').on('value', s => {
        const list = document.getElementById('game-list'); list.innerHTML = "";
        if(s.val()) Object.entries(s.val()).forEach(([id, g]) => {
            list.innerHTML += `<div class="game-card">
                <img src="${g.img}" class="game-img">
                <div class="game-info">
                    <b>${g.title}</b><br><small>Автор: ${g.author}</small>
                    <a href="${g.link}" target="_blank" class="btn btn-main" style="margin-top:10px;">ИГРАТЬ</a>
                    <button class="btn btn-rev" onclick="openReviews('${id}', '${g.title}')">ОТЗЫВЫ</button>
                </div>
            </div>`;
        });
    });

    function openReviews(id, title) {
        currentG = id;
        document.getElementById('rev-title').innerText = title;
        document.getElementById('rev-input-zone').style.display = user ? 'block' : 'none';
        db.ref('reviews').orderByChild('gameID').equalTo(id).on('value', s => {
            const cont = document.getElementById('rev-container'); cont.innerHTML = "";
            if(s.val()) Object.values(s.val()).forEach(r => {
                cont.innerHTML += `<div class="rev-item"><b>${r.author}:</b><br>${r.text}</div>`;
            }); else cont.innerHTML = "Отзывов нет.";
        });
        openM('rev-modal');
    }

    function sendReview() {
        const txt = document.getElementById('rev-text').value;
        if(!txt) return;
        db.ref('reviews').push({ gameID: currentG, author: user.nick, text: txt });
        document.getElementById('rev-text').value = "";
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
