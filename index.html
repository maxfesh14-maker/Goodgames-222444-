<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Games Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #000; --card: #111; --text: #fff; --nav: #151515; --online: #4CAF50; --vip: #FFD700; --ban: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #screen-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; padding: 20px; }
        #auth-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { width: 85%; max-width: 320px; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { background: var(--main); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        #portal-ui { display: none; height: 100vh; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; } .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--nav); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: #666; text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--main); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; position: relative; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1a1a1a; margin-bottom: 5px; border-radius: 8px; border-left: 3px solid var(--main); }
        #search-results { margin-top: 10px; }
    </style>
</head>
<body>

<div id="screen-msg"></div>

<div id="auth-box">
    <div class="auth-card" id="login-form">
        <h2 style="color:var(--main)">GOOD GAMES</h2>
        <input type="text" id="l-n" placeholder="Ник">
        <input type="password" id="l-p" placeholder="Пароль">
        <button class="btn" onclick="login()">ВОЙТИ</button>
        <button class="btn" style="background:#333; color:#fff" onclick="showAuth('reg')">РЕГИСТРАЦИЯ</button>
    </div>
    <div class="auth-card" id="reg-form" style="display:none">
        <h2 style="color:var(--main)">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="r-n" placeholder="Ник">
        <input type="password" id="r-p" placeholder="Пароль">
        <button class="btn" onclick="register()">СОЗДАТЬ</button>
        <button class="btn" style="background:#333; color:#fff" onclick="showAuth('login')">НАЗАД</button>
    </div>
</div>

<div id="portal-ui">
    <div class="content-area">
        <div id="p-games" class="page active"><h2 style="color:var(--main)">🎮 ИГРЫ</h2><div id="games-list"></div></div>
        <div id="p-add" class="page"><h2 style="color:var(--main)">➕ СОЗДАТЬ</h2><div id="add-content"></div></div>
        <div id="p-user" class="page">
            <h2 style="color:var(--main)">👤 ПРОФИЛЬ</h2>
            <div class="card" id="profile-info"></div>
            
            <h3 style="color:var(--main)">🔍 ПОИСК ИГРОКОВ</h3>
            <div class="card">
                <input type="text" id="user-search-input" placeholder="Введите ник игрока..." oninput="searchUsers()">
                <div id="search-results"></div>
            </div>

            <h3 style="color:var(--main)">🤝 МОИ ДРУЗЬЯ</h3>
            <div id="friends-list"></div>
        </div>
    </div>
    <div class="nav-bar">
        <div class="nav-btn active" onclick="tab('games', this)">🎮<br>Игры</div>
        <div class="nav-btn" onclick="tab('add', this)">➕<br>Создать</div>
        <div class="nav-btn" onclick="tab('user', this)">👤<br>Профиль</div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let me = { nick: "", vip: false, verified: false, friends: {} };

    function getDeviceID() {
        const info = [navigator.userAgent, screen.width, screen.height].join('|');
        let hash = 0;
        for (let i = 0; i < info.length; i++) { hash = ((hash << 5) - hash) + info.charCodeAt(i); hash |= 0; }
        return "DEV-" + Math.abs(hash);
    }
    const myDeviceID = getDeviceID();

    function showMsg(t, c) { const s = document.getElementById('screen-msg'); s.style.display = 'flex'; s.innerHTML = `<h1 style="color:${c}">${t}</h1>`; }
    
    function showAuth(m) { document.getElementById('login-form').style.display = m=='login'?'block':'none'; document.getElementById('reg-form').style.display = m=='reg'?'block':'none'; }

    function register() {
        const n = document.getElementById('r-n').value.trim(); const p = document.getElementById('r-p').value.trim();
        if(!n || !p) return;
        db.ref('users/' + n).set({ pass: p, verified: false, vip: false, ban: false, deviceID: myDeviceID }).then(() => { showAuth('login'); });
    }

    function login() {
        const n = document.getElementById('l-n').value.trim(); const p = document.getElementById('l-p').value.trim();
        db.ref('users/' + n).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                if(d.ban || d.deviceID_ban === myDeviceID) return showMsg("🚫 BAN", "var(--ban)");
                me = { nick: n, verified: d.verified, vip: d.vip, friends: d.friends || {} };
                document.getElementById('auth-box').style.display = 'none'; document.getElementById('portal-ui').style.display = 'flex';
                renderAdd(); loadGames(); renderProfile(); loadFriends();
            } else alert("Ошибка!");
        });
    }

    // ПОИСК ЛЮДЕЙ
    function searchUsers() {
        const query = document.getElementById('user-search-input').value.trim().toLowerCase();
        const resultsBox = document.getElementById('search-results');
        if(query.length < 2) { resultsBox.innerHTML = ""; return; }

        db.ref('users').once('value', s => {
            resultsBox.innerHTML = "";
            s.forEach(child => {
                const username = child.key;
                if(username.toLowerCase().includes(query) && username !== me.nick) {
                    const isFriend = me.friends && me.friends[username];
                    resultsBox.innerHTML += `
                        <div class="friend-item">
                            <span>👤 ${username}</span>
                            ${isFriend ? '<span style="color:var(--online)">Уже друг</span>' : 
                            `<button class="btn" style="width:auto; padding:5px 10px; font-size:12px" onclick="addFriend('${username}')">Добавить</button>`}
                        </div>`;
                }
            });
        });
    }

    function addFriend(target) {
        db.ref('users/' + target + '/requests/' + me.nick).set(true);
        alert("Запрос отправлен " + target);
    }

    function loadFriends() {
        db.ref('users/' + me.nick + '/friends').on('value', s => {
            const fList = document.getElementById('friends-list');
            fList.innerHTML = "";
            if(!s.val()) fList.innerHTML = "<div class='card'>У вас пока нет друзей. Попробуйте найти их через поиск выше!</div>";
            else {
                me.friends = s.val();
                Object.keys(s.val()).forEach(name => {
                    fList.innerHTML += `<div class="friend-item"><span>👤 ${name}</span><span style="color:var(--online)">●</span></div>`;
                });
            }
        });

        db.ref('users/' + me.nick + '/requests').on('value', s => {
            if(s.val()) {
                Object.keys(s.val()).forEach(name => {
                    if(confirm("Игрок " + name + " хочет дружить! Принять?")) {
                        db.ref('users/' + me.nick + '/friends/' + name).set(true);
                        db.ref('users/' + name + '/friends/' + me.nick).set(true);
                    }
                    db.ref('users/' + me.nick + '/requests/' + name).remove();
                });
            }
        });
    }

    function loadGames() {
        db.ref('games').on('value', s => {
            const l = document.getElementById('games-list'); l.innerHTML = "";
            if(s.val()) Object.entries(s.val()).reverse().forEach(([id, g]) => {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<b>${g.title}</b><br><small>Автор: ${g.author || 'Анон'}</small>
                <button class="btn" style="background:#4CAF50;color:#fff" onclick="window.open('${g.url}')">ИГРАТЬ</button>
                <div style="margin-top:5px; border-top:1px solid #333">
                <input id="ri-${id}" placeholder="Отзыв..." style="font-size:12px"><button class="btn" style="padding:5px" onclick="addR('${id}')">ОК</button></div>`;
                l.appendChild(card);
            });
        });
    }

    function addR(id) { 
        const inp = document.getElementById('ri-'+id);
        if(inp.value.trim()) {
            db.ref('games/'+id+'/reviews').push({user:me.nick, text:inp.value});
            inp.value = "";
        }
    }

    function renderAdd() {
        const c = document.getElementById('add-content');
        if(me.verified || me.vip) c.innerHTML = `<div class="card"><input id="gt" placeholder="Название"><input id="gl" placeholder="Ссылка"><button class="btn" onclick="send()">ОТПРАВИТЬ</button></div>`;
        else c.innerHTML = `<div class="card">Только проверенные пользователи могут публиковать игры.</div>`;
    }

    function send() {
        const t = document.getElementById('gt').value; const l = document.getElementById('gl').value;
        if(t && l) db.ref('games').push({title:t, url:l, author:me.nick}).then(() => { alert("Опубликовано!"); document.getElementById('gt').value=""; document.getElementById('gl').value=""; });
    }

    function tab(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById('p-' + id).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function renderProfile() { document.getElementById('profile-info').innerHTML = `<h3>${me.nick}</h3><p style="color:var(--main)">ID: ${myDeviceID}</p>`; }
</script>
</body>
</html>
